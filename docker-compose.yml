

services:

  service-registry:
    image: service-registry:latest
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - medicare-network

  patient-service:
    image: patient-service:latest
    container_name: patient-service
    ports:
      - "8081:8081"
    depends_on:
      - service-registry
    networks:
      - medicare-network

  doctor-service:
    image: doctor-service:latest
    container_name: doctor-service
    ports:
      - "8082:8082"
    depends_on:
      - service-registry
    networks:
      - medicare-network

  appointment-service:
    image: appointment-service:latest
    container_name: appointment-service
    ports:
      - "8083:8083"
    depends_on:
      - service-registry
    networks:
      - medicare-network

  auth-service:
    image: auth-service:latest
    container_name: auth-service
    ports:
      - "8084:8084"
    depends_on:
      - service-registry
    networks:
      - medicare-network

  api-gateway:
    image: api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-registry
    networks:
      - medicare-network

networks:
  medicare-network:
    driver: bridge